<!doctype html><html><head><meta charset="utf-8"><title>probe-start</title></head>
<body>
<canvas id="canvas" width="400" height="400" style="width:400px;height:400px"></canvas>
<pre id="out">init...</pre>
<script src="stellarium-web-engine.js"></script>
<script>
(async () => {
  const out = (o) => { document.getElementById('out').textContent = JSON.stringify(o); document.title = 'done'; };
  const sleep = (ms) => new Promise(r => setTimeout(r, ms));
  const canvas = document.getElementById('canvas');
  const deg = (r) => +(r * 180 / Math.PI).toFixed(2);
  const EYE = 60 * Math.PI / 180;
  let stel, c, gyroMode = true;

  function mkTouch(id, x, y) { return new Touch({ identifier: id, target: canvas, clientX: x, clientY: y, pageX: x, pageY: y }); }
  function fire(type, touches, changed) { canvas.dispatchEvent(new TouchEvent(type, { touches, targetTouches: touches, changedTouches: changed || touches, bubbles: true, cancelable: true })); }
  async function pinchTogether() {
    const cx = 200, cy = 200; const a = (s) => mkTouch(0, cx - s, cy), b = (s) => mkTouch(1, cx + s, cy);
    let sep = 180; fire('touchstart', [a(sep), b(sep)]);
    for (sep = 180; sep >= 10; sep -= 6) { fire('touchmove', [a(sep), b(sep)]); await sleep(12); }
    fire('touchend', [], [a(10), b(10)]);
  }
  async function pinchApart() { // zoom IN: should NOT be blocked
    const cx = 200, cy = 200; const a = (s) => mkTouch(0, cx - s, cy), b = (s) => mkTouch(1, cx + s, cy);
    let sep = 10; fire('touchstart', [a(sep), b(sep)]);
    for (sep = 10; sep <= 180; sep += 6) { fire('touchmove', [a(sep), b(sep)]); await sleep(12); }
    fire('touchend', [], [a(180), b(180)]);
  }

  // ---- CANDIDATE FIX: capture-phase interception of zoom-out past the cap ----
  let prevDist = null;
  window.addEventListener('touchmove', (e) => {
    if (!gyroMode || e.touches.length !== 2) { prevDist = null; return; }
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.hypot(dx, dy);
    const zoomingOut = prevDist !== null && dist < prevDist; // fingers together => zoom out
    if (zoomingOut && c.fov >= EYE - 1e-6) {
      e.preventDefault(); e.stopImmediatePropagation();
      return; // keep prevDist as baseline
    }
    prevDist = dist;
  }, { capture: true, passive: false });
  window.addEventListener('touchend', () => { prevDist = null; }, { capture: true });

  // overlay clamp safety net (existing behaviour)
  function overlayLoop() { if (gyroMode && c.fov > EYE) c.fov = EYE; requestAnimationFrame(overlayLoop); }

  try {
    stel = await StelWebEngine({ canvas, wasmFile: 'stellarium-web-engine.wasm' });
    c = stel.core;
    requestAnimationFrame(overlayLoop);
    const res = {};

    // zoom-out from 30: should be capped at 60 during the whole gesture
    c.fov = 30 * Math.PI / 180; await sleep(50);
    let peak = 0; let s = setInterval(() => { if (c.fov > peak) peak = c.fov; }, 8);
    await pinchTogether(); await sleep(400); clearInterval(s);
    res.zoomout_from30 = { peak: deg(peak), settled: deg(c.fov) };

    // zoom-IN must still work (start at cap 60, pinch apart -> small fov)
    c.fov = 60 * Math.PI / 180; await sleep(50);
    await pinchApart(); await sleep(200);
    res.zoomin_from60 = { settled: deg(c.fov) };

    out(res);
  } catch (e) { out({ fatal: String(e) }); }
})();
</script>
</body></html>
